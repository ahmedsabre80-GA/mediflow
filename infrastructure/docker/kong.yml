_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://auth-service:8001
    routes:
      - name: auth-routes
        paths: [/api/v1/auth]
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 30
          hour: 200
          policy: local

  - name: patient-service
    url: http://patient-service:8003
    routes:
      - name: patient-routes
        paths: [/api/v1/patients]
        strip_path: false
    plugins:
      - name: jwt
        config:
          key_claim_name: kid
          claims_to_verify: [exp, nbf]

  - name: pharmacy-service
    url: http://pharmacy-service:8005
    routes:
      - name: pharmacy-routes
        paths: [/api/v1/pharmacies]
        strip_path: false

  - name: order-service
    url: http://order-service:8010
    routes:
      - name: order-routes
        paths: [/api/v1/orders, /api/v1/medication-requests]
        strip_path: false
    plugins:
      - name: jwt
      - name: rate-limiting
        config:
          minute: 60

  - name: prescription-service
    url: http://prescription-service:8011
    routes:
      - name: prescription-routes
        paths: [/api/v1/prescriptions]
        strip_path: false
    plugins:
      - name: jwt

  - name: gis-service
    url: http://gis-service:8017
    routes:
      - name: gis-routes
        paths: [/api/v1/gis]
        strip_path: false

  - name: analytics-service
    url: http://analytics-service:8018
    routes:
      - name: analytics-routes
        paths: [/api/v1/analytics]
        strip_path: false
    plugins:
      - name: jwt
        config: {}

  - name: ai-service
    url: http://ai-service:8019
    routes:
      - name: ai-routes
        paths: [/api/v1/ai]
        strip_path: false
    plugins:
      - name: jwt
      - name: rate-limiting
        config:
          minute: 20

plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers: [Accept, Authorization, Content-Type, X-Trace-Id, Idempotency-Key]
      exposed_headers: [X-Trace-Id]
      credentials: true
      max_age: 3600

  - name: request-size-limiting
    config:
      allowed_payload_size: 50

  - name: response-ratelimiting
    config:
      limits:
        default:
          minute: 1000
