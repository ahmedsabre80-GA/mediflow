version: '3.9'

services:
  # ─── DATABASES ────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mediflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mediflow
      POSTGRES_USER: mediflow
      POSTGRES_PASSWORD: mediflow_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mediflow-redis
    restart: unless-stopped
    command: redis-server --requirepass mediflow_dev_password --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "mediflow_dev_password", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: mediflow-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mediflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mediflow
      MINIO_ROOT_PASSWORD: mediflow_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ─── MESSAGE BROKER ───────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: mediflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: mediflow-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: mediflow-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

  # ─── MICROSERVICES ────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: mediflow-auth-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      NODE_ENV: development
      PORT: 8001
      DATABASE_URL: postgresql://mediflow:mediflow_dev_password@postgres:5432/mediflow
      REDIS_URL: redis://:mediflow_dev_password@redis:6379
      KAFKA_BROKERS: kafka:29092
      JWT_PRIVATE_KEY_PATH: /app/keys/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt-public.pem
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: mediflow-user-service
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      NODE_ENV: development
      PORT: 8002
      DATABASE_URL: postgresql://mediflow:mediflow_dev_password@postgres:5432/mediflow
      REDIS_URL: redis://:mediflow_dev_password@redis:6379
      KAFKA_BROKERS: kafka:29092
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      - auth-service

  patient-service:
    build:
      context: .
      dockerfile: services/patient-service/Dockerfile
    container_name: mediflow-patient-service
    ports:
      - "8003:8003"
    environment:
      NODE_ENV: development
      PORT: 8003
      DATABASE_URL: postgresql://mediflow:mediflow_dev_password@postgres:5432/mediflow
      REDIS_URL: redis://:mediflow_dev_password@redis:6379
      KAFKA_BROKERS: kafka:29092

  pharmacy-service:
    build:
      context: .
      dockerfile: services/pharmacy-service/Dockerfile
    container_name: mediflow-pharmacy-service
    ports:
      - "8005:8005"
    environment:
      NODE_ENV: development
      PORT: 8005
      DATABASE_URL: postgresql://mediflow:mediflow_dev_password@postgres:5432/mediflow
      REDIS_URL: redis://:mediflow_dev_password@redis:6379
      KAFKA_BROKERS: kafka:29092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: mediflow
      MINIO_SECRET_KEY: mediflow_dev_password

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: mediflow-order-service
    ports:
      - "8010:8010"
    environment:
      NODE_ENV: development
      PORT: 8010
      DATABASE_URL: postgresql://mediflow:mediflow_dev_password@postgres:5432/mediflow
      REDIS_URL: redis://:mediflow_dev_password@redis:6379
      KAFKA_BROKERS: kafka:29092
      GIS_SERVICE_URL: http://gis-service:8017
      INVENTORY_SERVICE_URL: http://inventory-service:8009
      PAYMENT_SERVICE_URL: http://payment-service:8013

  gis-service:
    build:
      context: .
      dockerfile: services/gis-service/Dockerfile
    container_name: mediflow-gis-service
    ports:
      - "8017:8017"
    environment:
      NODE_ENV: development
      PORT: 8017
      DATABASE_URL: postgresql://mediflow:mediflow_dev_password@postgres:5432/mediflow
      REDIS_URL: redis://:mediflow_dev_password@redis:6379
      MAPBOX_TOKEN: ${MAPBOX_TOKEN}

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: mediflow-notification-service
    ports:
      - "8014:8014"
    environment:
      NODE_ENV: development
      PORT: 8014
      REDIS_URL: redis://:mediflow_dev_password@redis:6379
      KAFKA_BROKERS: kafka:29092
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}

  # ─── API GATEWAY ──────────────────────────────────────────────────
  api-gateway:
    image: kong:3.6-ubuntu
    container_name: mediflow-api-gateway
    restart: unless-stopped
    ports:
      - "80:8000"
      - "443:8443"
      - "8444:8444"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8444"
    volumes:
      - ./infrastructure/kong/kong.yml:/kong/kong.yml

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:
  zookeeper_data:
  kafka_data:

networks:
  default:
    name: mediflow-network
